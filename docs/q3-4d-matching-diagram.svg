<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">

  <!-- 배경 -->
  <rect width="1200" height="900" fill="#F8FAFC"/>

  <!-- 헤더 -->
  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#1F2937">이름이 아니라, 군 시절의 4차원 변수로 매칭한다</text>
  <text x="600" y="90" text-anchor="middle" font-size="14" fill="#64748B">Unit × Class × Role × Period · 군번·전역증 인증 · 이중 옵트인 · 4개국어</text>

  <!-- 섹션 1 라벨 -->
  <text x="60" y="148" font-size="12" font-weight="700" fill="#64748B" letter-spacing="3">기존의 한계 — 옛 전우를 못 찾는 이유</text>

  <!-- 박스: 네이버 밴드·카페 (한국 1차 채널) -->
  <g transform="translate(60, 165)">
    <rect width="345" height="84" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
    <text x="22" y="32" font-size="15" font-weight="700" fill="#991B1B">네이버 밴드 · 카페 (한국 1차 채널)</text>
    <text x="22" y="56" font-size="12.5" fill="#7F1D1D">학교·기수 동창회 중심, 부대 그룹 산발</text>
    <text x="22" y="74" font-size="12.5" fill="#7F1D1D">매칭 변수 없음 · 군 복무 인증 없음</text>
  </g>

  <!-- 박스: 페이스북·다음 사람찾기 -->
  <g transform="translate(425, 165)">
    <rect width="345" height="84" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
    <text x="22" y="32" font-size="15" font-weight="700" fill="#991B1B">페이스북 · 다음 사람찾기</text>
    <text x="22" y="56" font-size="12.5" fill="#7F1D1D">이름·학교·고향 기반 검색</text>
    <text x="22" y="74" font-size="12.5" fill="#7F1D1D">동명이인·개명·해외 이주에 막힘 · 인증 없음</text>
  </g>

  <!-- 박스: 미국 TWS -->
  <g transform="translate(790, 165)">
    <rect width="350" height="84" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
    <text x="22" y="32" font-size="15" font-weight="700" fill="#991B1B">미국 TWS (약 258만 회원, 2003~)</text>
    <text x="22" y="56" font-size="12.5" fill="#7F1D1D">부대·기수 매칭 + 군 복무 인증 검증된 모델</text>
    <text x="22" y="74" font-size="12.5" fill="#7F1D1D">미국 한정 · 한국군 출신 미접근 — 시장 공백</text>
  </g>

  <!-- 화살표 ↓ -->
  <g transform="translate(595, 270)">
    <line x1="0" y1="0" x2="0" y2="38" stroke="#0EA5E9" stroke-width="3.5"/>
    <polygon points="-10,38 10,38 0,55" fill="#0EA5E9"/>
  </g>

  <!-- 섹션 2: 4D 매칭 엔진 -->
  <g transform="translate(60, 350)">
    <rect width="1080" height="340" rx="14" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2.5"/>

    <text x="540" y="36" text-anchor="middle" font-size="13" font-weight="700" fill="#0EA5E9" letter-spacing="3">전우찾기 4D MATCHING ENGINE</text>

    <g transform="translate(40, 65)">
      <rect width="200" height="90" rx="10" fill="#0EA5E9"/>
      <text x="100" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="white">부대</text>
      <text x="100" y="58" text-anchor="middle" font-size="12.5" fill="#E0F2FE">Unit</text>
      <text x="100" y="78" text-anchor="middle" font-size="11.5" fill="#BAE6FD">사단·연대·대대·중대</text>
    </g>

    <g transform="translate(260, 65)">
      <rect width="200" height="90" rx="10" fill="#0EA5E9"/>
      <text x="100" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="white">기수</text>
      <text x="100" y="58" text-anchor="middle" font-size="12.5" fill="#E0F2FE">Class</text>
      <text x="100" y="78" text-anchor="middle" font-size="11.5" fill="#BAE6FD">입대 연차·코호트</text>
    </g>

    <g transform="translate(480, 65)">
      <rect width="200" height="90" rx="10" fill="#0EA5E9"/>
      <text x="100" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="white">보직</text>
      <text x="100" y="58" text-anchor="middle" font-size="12.5" fill="#E0F2FE">Role</text>
      <text x="100" y="78" text-anchor="middle" font-size="11.5" fill="#BAE6FD">특기·MOS·보직코드</text>
    </g>

    <g transform="translate(700, 65)">
      <rect width="200" height="90" rx="10" fill="#0EA5E9"/>
      <text x="100" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="white">복무 시기</text>
      <text x="100" y="58" text-anchor="middle" font-size="12.5" fill="#E0F2FE">Period</text>
      <text x="100" y="78" text-anchor="middle" font-size="11.5" fill="#BAE6FD">입대 ~ 전역 기간</text>
    </g>

    <g transform="translate(920, 65)">
      <rect width="140" height="90" rx="10" fill="#FACC15"/>
      <text x="70" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="#1F2937">군번·전역증</text>
      <text x="70" y="54" text-anchor="middle" font-size="14" font-weight="700" fill="#1F2937">인증</text>
      <text x="70" y="76" text-anchor="middle" font-size="11.5" fill="#713F12">OCR + 운영자 검증</text>
    </g>

    <g stroke="#94A3B8" stroke-width="1.5" fill="none" stroke-dasharray="4 3">
      <line x1="140" y1="155" x2="540" y2="195"/>
      <line x1="360" y1="155" x2="540" y2="195"/>
      <line x1="580" y1="155" x2="540" y2="195"/>
      <line x1="800" y1="155" x2="540" y2="195"/>
    </g>

    <g transform="translate(40, 205)">
      <rect width="1000" height="120" rx="10" fill="#1F2937"/>
      <text x="500" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#FACC15" letter-spacing="3">매칭 결과 — 이중 옵트인 흐름</text>

      <g transform="translate(40, 50)">
        <rect width="280" height="50" rx="8" fill="#374151"/>
        <text x="20" y="22" font-size="11.5" font-weight="700" fill="#FACC15">STEP 1</text>
        <text x="20" y="40" font-size="13" fill="white">익명 매칭 결과 표시</text>
      </g>

      <text x="335" y="80" font-size="20" fill="#9CA3AF">→</text>

      <g transform="translate(355, 50)">
        <rect width="280" height="50" rx="8" fill="#374151"/>
        <text x="20" y="22" font-size="11.5" font-weight="700" fill="#FACC15">STEP 2</text>
        <text x="20" y="40" font-size="13" fill="white">연결 요청 발송</text>
      </g>

      <text x="650" y="80" font-size="20" fill="#9CA3AF">→</text>

      <g transform="translate(670, 50)">
        <rect width="290" height="50" rx="8" fill="#10B981"/>
        <text x="20" y="22" font-size="11.5" font-weight="700" fill="#D1FAE5">STEP 3</text>
        <text x="20" y="40" font-size="13" font-weight="600" fill="white">동의 후 연락처 공개</text>
      </g>
    </g>
  </g>

  <!-- 화살표 ↓ -->
  <g transform="translate(595, 705)">
    <line x1="0" y1="0" x2="0" y2="32" stroke="#0EA5E9" stroke-width="3.5"/>
    <polygon points="-10,32 10,32 0,49" fill="#0EA5E9"/>
  </g>

  <!-- 섹션 3: 4개국어 확장 -->
  <g transform="translate(60, 775)">
    <rect width="1080" height="105" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="40" y="38" font-size="15" font-weight="700" fill="#1F2937">4개국어 i18n — 출시 시점 활성화</text>

    <g transform="translate(40, 56)">
      <rect width="115" height="32" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
      <text x="57.5" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">한국어</text>
    </g>
    <g transform="translate(165, 56)">
      <rect width="115" height="32" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
      <text x="57.5" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">English</text>
    </g>
    <g transform="translate(290, 56)">
      <rect width="115" height="32" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
      <text x="57.5" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">日本語</text>
    </g>
    <g transform="translate(415, 56)">
      <rect width="115" height="32" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
      <text x="57.5" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">中文</text>
    </g>

    <text x="555" y="77" font-size="13" font-weight="600" fill="#0EA5E9">→ KATUSA · 해외 한인 전역자 풀 즉시 접근 (미국 258만+ TWS가 가지 못한 영역)</text>
  </g>

</svg>
